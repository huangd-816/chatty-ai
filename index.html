<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0816 - Snapchat Companion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="status">
      <div class="avatar">👻</div>
      <div>
        <div class="name">0816</div>
        <div class="online">● Online</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="startCall()" title="Start call">📞</button>
      <button class="icon-btn" onclick="endCall()" title="End call">❌</button>
    </div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputbar">
    <input type="file" id="fileInput" accept="image/*" hidden>
    <button class="icon-btn" onclick="fileInput.click()" title="Upload image">📸</button>
    <button class="icon-btn" id="recordBtn" title="Voice record">🎤</button>
    <input id="input" type="text" placeholder="Say something..." />
    <button class="send-btn" onclick="sendMessage()" title="Send">→</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
